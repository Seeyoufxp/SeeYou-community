server:
  port: 8084

spring:
  config:
    import:
      - optional:file:./config/application-secret.yml
      - optional:file:../config/application-secret.yml

  elasticsearch:
    uris: http://${elasticsearch.host}:${elasticsearch.port}
    username: ${elasticsearch.username}
    password: ${elasticsearch.password}

  cloud:
    # Spring Cloud Stream 消费 content-event-topic
    # binding 名 contentEvent-in-0 对应的函数 Bean 名是 contentEvent
    function:
      definition: contentEvent
    stream:
      rocketmq:
        binder:
          name-server: ${rocketmq.name-server:127.0.0.1:9876}
          access-key: ${rocketmq.access-key:}
          secret-key: ${rocketmq.secret-key:}
      bindings:
        contentEvent-in-0:
          destination: content-event-topic
          content-type: application/json
          group: search-consumer-group