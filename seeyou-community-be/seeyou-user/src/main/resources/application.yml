server:
  port: 8081

spring:
  config:
    import:
      - optional:file:./config/application-secret.yml
      - optional:file:../config/application-secret.yml

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${mysql.host}:${mysql.port}/seeyou_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${mysql.username}
    password: ${mysql.password}

  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}
      password: ${redis.password}

  cloud:
    stream:
      rocketmq:
        binder:
          name-server: ${rocketmq.name-server:127.0.0.1:9876}
      bindings:
        userEvent-out-0:
          destination: user-event-topic
          content-type: application/json

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      # user_info / chat_message 使用雪花算法手动赋值
      id-type: input
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl