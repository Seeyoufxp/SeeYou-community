server:
  port: 8080

spring:
  config:
    import:
      - optional:file:./config/application-secret.yml
      - optional:file:../config/application-secret.yml

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://seeyou-user
          predicates:
            - Path=/api/user/**
        - id: content-service
          uri: lb://seeyou-content
          predicates:
            - Path=/api/post/**,/api/blog/**,/api/qa/**,/api/comment/**
        - id: chat-service
          uri: lb://seeyou-chat
          predicates:
            - Path=/api/chat/**
        - id: search-service
          uri: lb://seeyou-search
          predicates:
            - Path=/api/search/**
        - id: ai-service
          uri: lb://seeyou-ai
          predicates:
            - Path=/api/ai/**

  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}
      password: ${redis.password}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:${jwt.secret:}}
  expire: ${JWT_EXPIRE:${jwt.expire:86400000}}

# 网关鉴权白名单
gateway:
  auth:
    white-list:
      - /api/user/login
      - /api/user/register
      - /api/user/captcha
      - /api/search/**
      - /api/post/list
      - /api/blog/list
      - /api/qa/list
      - /api/ai/welcome
      - /doc.html
      - /v3/api-docs/**
      - /swagger-resources/**
      - /webjars/**
      - /favicon.ico
